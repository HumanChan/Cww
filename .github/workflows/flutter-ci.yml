name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Analyze and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test

  build-web-android:
    name: Build Web and Android
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build Web release
        run: flutter build web --release
      - name: Build Android debug APK
        run: flutter build apk --debug

  build-ios:
    name: Build iOS simulator
    if: github.event_name != 'pull_request'
    needs: quality
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build iOS simulator
        run: flutter build ios --simulator
