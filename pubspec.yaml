name: cww_flutter
description: "MoYuStock 的跨平台 Flutter 实现，支持 Android 与 iOS。"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.3.3
  file_picker: ^11.0.2
  path_provider: ^2.1.5
  share_plus: ^10.1.2
  intl: ^0.20.1
  fl_chart: ^1.2.0
  flex_color_scheme: ^8.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
